<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="200mm"
   height="100mm"
   viewBox="0 0 200 100"
   version="1.1"
   id="svg_zeppelin"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  
  <defs id="defs_zeppelin" />
  
  <g id="layer_main" transform="translate(10, 10)">
    
    <ellipse
       style="fill:#b3b3b3;stroke:#000000;stroke-width:1;"
       id="body_ellipse"
       cx="90"
       cy="40"
       rx="80"
       ry="30" />
       
    <rect
       style="fill:#cc0000;stroke:#000000;stroke-width:1;"
       id="fin_top"
       width="10"
       height="20"
       x="160"
       y="10" />
       
    <rect
       style="fill:#cc0000;stroke:#000000;stroke-width:1;"
       id="fin_bottom"
       width="10"
       height="20"
       x="160"
       y="50" />
       
    <rect
       style="fill:#7f7f7f;stroke:#000000;stroke-width:1;"
       id="fin_rudder"
       width="20"
       height="10"
       x="170"
       y="35" />

  </g>
</svg>

